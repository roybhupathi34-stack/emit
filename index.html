<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firebase Messaging App</title>
    <!-- Use the modular Firebase SDK for best performance -->
    <script type="module">
      import { initializeApp } from "https://gstatic.com";
      import { getMessaging, getToken, onMessage } from "https://gstatic.com";

      // TODO: Replace with your actual project's config from the Firebase Console
      // Settings > Your Apps > SDK setup and configuration
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_://firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_://appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const messaging = getMessaging(app);

      // Function to request permission and get Token
      async function requestPermission() {
        console.log('Requesting permission...');
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('Notification permission granted.');
          
          // Get registration token. VAPID key is found in Cloud Messaging tab of console.
          const token = await getToken(messaging, { vapidKey: 'YOUR_VAPID_KEY' });
          if (token) {
            document.getElementById('token-display').innerText = "Device Token: " + token;
            console.log('Token:', token);
          } else {
            console.log('No registration token available. Request permission to generate one.');
          }
        } else {
          console.log('Unable to get permission to notify.');
        }
      }

      // Handle foreground messages
      onMessage(messaging, (payload) => {
        console.log('Foreground Message received: ', payload);
        const { title, body } = payload.notification;
        alert(`${title}: ${body}`);
      });

      window.requestPermission = requestPermission;
    </script>
</head>
<body>
    <h1>Firebase Messaging Demo</h1>
    <button onclick="requestPermission()">Enable Notifications</button>
    <p id="token-display">Click the button to get your token.</p>
</body>
</html>
